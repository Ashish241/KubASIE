apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: target-app-hpa
  namespace: autoscaler
  labels:
    app: target-app
    managed-by: k8s-autoscaling-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: target-app
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
