apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-collector
  namespace: autoscaler
  labels:
    app: metrics-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-collector
  template:
    metadata:
      labels:
        app: metrics-collector
    spec:
      containers:
        - name: metrics-collector
          image: metrics-collector:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-service:9090"
            - name: INFLUXDB_URL
              value: "http://influxdb-service:8086"
            - name: COLLECTION_INTERVAL
              value: "30"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
