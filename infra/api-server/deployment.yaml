apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: autoscaler
  labels:
    app: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          image: api-server:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ML_PREDICTOR_URL
              value: "http://ml-predictor-service:8000"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-server-service
  namespace: autoscaler
  labels:
    app: api-server
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
      nodePort: 30080
  selector:
    app: api-server
  type: NodePort
