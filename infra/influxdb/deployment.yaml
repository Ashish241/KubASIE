apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:2.7
          ports:
            - containerPort: 8086
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: "setup"
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              value: "admin"
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              value: "autoscaler-password"
            - name: DOCKER_INFLUXDB_INIT_ORG
              value: "autoscaler"
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              value: "metrics"
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              value: "autoscaler-token"
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb2
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb-service
  namespace: autoscaler
spec:
  selector:
    app: influxdb
  ports:
    - port: 8086
      targetPort: 8086
