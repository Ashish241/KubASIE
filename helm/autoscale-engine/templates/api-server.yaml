apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "autoscale-engine.componentLabels" (dict "component" "api-server" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.apiServer.replicas }}
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          image: {{ .Values.apiServer.image }}
          imagePullPolicy: {{ .Values.apiServer.imagePullPolicy }}
          env:
            - name: ML_PREDICTOR_URL
              value: "http://ml-predictor-service:{{ .Values.mlPredictor.port }}"
          ports:
            - containerPort: {{ .Values.apiServer.port }}
              name: http
          resources:
            {{- toYaml .Values.apiServer.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiServer.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-server-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "autoscale-engine.componentLabels" (dict "component" "api-server" "root" .) | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.apiServer.port }}
      targetPort: {{ .Values.apiServer.port }}
      protocol: TCP
      name: http
      {{- if eq .Values.apiServer.service.type "NodePort" }}
      nodePort: {{ .Values.apiServer.service.nodePort }}
      {{- end }}
  selector:
    app: api-server
  type: {{ .Values.apiServer.service.type }}
