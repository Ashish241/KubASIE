name: CI — K8s Auto-Scaling Intelligence Engine

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Run ruff (linter)
        run: ruff check . --output-format=github

      - name: Run mypy (type check)
        run: mypy scaling-engine/ api-server/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

  test-metrics-collector:
    name: Test Metrics Collector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd metrics-collector
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          cd metrics-collector
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  test-ml-predictor:
    name: Test ML Predictor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd ml-predictor
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          cd ml-predictor
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  test-scaling-engine:
    name: Test Scaling Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd scaling-engine
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          cd scaling-engine
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  test-api-server:
    name: Test API Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd api-server
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      - name: Run tests
        run: |
          cd api-server
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  test-dashboard:
    name: Test Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd dashboard
          npm ci
      - name: Build production bundle
        run: |
          cd dashboard
          npm run build

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-metrics-collector, test-ml-predictor, test-scaling-engine, test-api-server, test-dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Build target-app
        run: docker build -t target-app:ci ./target-app

      - name: Build metrics-collector
        run: docker build -t metrics-collector:ci ./metrics-collector

      - name: Build api-server
        run: docker build -t api-server:ci ./api-server

      - name: Build ml-predictor
        run: docker build -t ml-predictor:ci ./ml-predictor

      - name: Build scaling-engine
        run: docker build -t scaling-engine:ci ./scaling-engine

      - name: Build dashboard
        run: docker build -t dashboard:ci ./dashboard

      - name: Verify images
        run: docker images | grep ci

